<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solwix AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-800 font-['Inter'] h-screen flex flex-col overflow-hidden">

    <header class="flex items-center justify-between px-6 py-4 bg-white border-b border-slate-200 shadow-sm z-30 shrink-0">
        <div class="flex items-center gap-3 p-2 rounded-xl hover:bg-slate-50 transition-all cursor-pointer group">
            <svg width="32" height="32" viewBox="0 0 100 100">
                <defs>
                    <linearGradient id="grad-solwix" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#6366f1" />
                        <stop offset="100%" style="stop-color:#a855f7" />
                    </linearGradient>
                </defs>
                <polygon points="50,5 60,40 95,50 60,60 50,95 40,60 5,50 40,40" fill="url(#grad-solwix)" />
            </svg>
            <h1 class="text-xl font-bold text-slate-900">Solwix <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-purple-500">AI</span></h1>
        </div>

        <div class="flex gap-2">
            <select id="subject-select" class="bg-slate-50 border border-slate-200 py-2 px-3 rounded-lg text-sm font-medium outline-none focus:ring-2 focus:ring-indigo-500 transition-all shadow-sm">
                <option value="Математика">Математика</option>
                <option value="Физика">Физика</option>
                <option value="История">История</option>
                <option value="English">English</option>
            </select>
            <select id="level-select" class="bg-indigo-50 border border-indigo-100 text-indigo-700 py-2 px-3 rounded-lg text-sm font-medium outline-none shadow-sm">
                <option value="Младшая школа">Младшая</option>
                <option value="Средняя школа" selected>Средняя</option>
                <option value="Профи/ВУЗ">Профи/ВУЗ</option>
            </select>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-72 bg-white border-r border-slate-200 flex flex-col shrink-0 z-20">
            <div class="p-4 border-b border-slate-50 font-bold text-[11px] text-slate-400 uppercase tracking-widest">Инструменты</div>
            <div id="tools-container" class="p-3 space-y-2 overflow-y-auto max-h-[50%]"></div>
            
            <div class="mx-4 border-t border-slate-100 my-2"></div> <div class="p-4 font-bold text-[11px] text-slate-400 uppercase tracking-widest">Управление</div>
            <div class="px-3 space-y-2">
                <button onclick="window.location.reload()" class="flex items-center gap-3 p-3 w-full text-left rounded-xl hover:bg-slate-50 transition-all text-slate-600">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i>
                    <span class="text-sm font-medium">Новый чат</span>
                </button>
                <button class="flex items-center gap-3 p-3 w-full text-left rounded-xl hover:bg-slate-50 transition-all text-slate-600">
                    <i data-lucide="share-2" class="w-4 h-4"></i>
                    <span class="text-sm font-medium">Поделиться</span>
                </button>
            </div>

            <div class="mt-auto m-4 p-5 rounded-2xl bg-gradient-to-br from-slate-900 to-indigo-950 text-white shadow-lg relative overflow-hidden">
                <div class="relative z-10">
                    <div class="flex items-center gap-2 text-indigo-400 font-bold mb-1">
                        <span class="text-lg">✦</span>
                        <span class="text-[9px] uppercase tracking-tighter">Gemini 2.5 Engine</span>
                    </div>
                    <p class="text-[8px] text-slate-500 uppercase tracking-widest leading-relaxed">Grid Entertainment Neural System</p>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 bg-[#f8fafc]">
            <div class="flex-1 overflow-y-auto p-4 sm:p-8" id="chat-scroll-area">
                <div id="chat-messages" class="space-y-8 max-w-4xl mx-auto"></div>
                
                <div id="ai-typing-indicator" class="hidden mt-6 ml-4 flex items-center gap-3">
                    <div class="thinking-star">
                        <svg width="24" height="24" viewBox="0 0 100 100">
                            <polygon points="50,5 60,40 95,50 60,60 50,95 40,60 5,50 40,40" fill="url(#grad-solwix)" />
                        </svg>
                    </div>
                    <span id="typing-text" class="text-[10px] font-black text-indigo-400 uppercase tracking-widest">Solwix is thinking...</span>
                </div>
            </div>

            <div class="p-4 sm:p-6 bg-white border-t border-slate-200 shadow-sm">
                <div class="max-w-4xl mx-auto flex items-end gap-3 bg-slate-50 border border-slate-300 rounded-2xl p-2 focus-within:border-indigo-500 transition-all shadow-sm">
                    <textarea id="chat-input" placeholder="Введите сообщение..." rows="1" class="w-full bg-transparent outline-none resize-none py-3 px-4 text-slate-700 text-sm"></textarea>
                    <button id="send-btn" class="bg-gradient-to-r from-indigo-500 to-purple-500 text-white p-3 rounded-xl hover:scale-105 transition-all shadow-md">
                        <i data-lucide="send" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
