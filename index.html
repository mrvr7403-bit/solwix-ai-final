<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solwix AI — Твой умный помощник</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%236366f1' /%3E%3Cstop offset='100%25' style='stop-color:%23a855f7' /%3E%3C/linearGradient%3E%3C/defs%3E%3Cpolygon points='50,5 60,40 95,50 60,60 50,95 40,60 5,50 40,40' fill='url(%23g)' /%3E%3C/svg%3E">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-800 font-['Inter'] h-[100dvh] flex flex-col overflow-hidden">

    <header class="flex items-center justify-between px-4 sm:px-6 py-3 bg-white border-b border-slate-200 shadow-sm z-30 shrink-0">
        <div class="flex items-center gap-2">
            <button id="mobile-menu-btn" class="sm:hidden p-2 hover:bg-slate-100 rounded-lg text-slate-600 transition-colors">
                <i data-lucide="menu" class="w-6 h-6"></i>
            </button>
            <div class="flex items-center gap-3 logo-container">
                <div class="logo-wrapper">
                    <svg width="32" height="32" viewBox="0 0 100 100">
                        <defs>
                            <linearGradient id="grad-solwix-head" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#6366f1" />
                                <stop offset="100%" style="stop-color:#a855f7" />
                            </linearGradient>
                        </defs>
                        <polygon points="50,5 60,40 95,50 60,60 50,95 40,60 5,50 40,40" fill="url(#grad-solwix-head)" />
                    </svg>
                </div>
                <h1 class="text-xl font-bold text-slate-900 hidden xs:block">Solwix <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-purple-500">AI</span></h1>
            </div>
        </div>

        <div class="flex gap-2">
            <select id="subject-select" class="bg-slate-50 border border-slate-200 py-1.5 px-3 rounded-lg text-xs font-medium outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm transition-all">
                <option value="Математика" selected>Математика</option>
                <option value="Информатика">Информатика</option>
                <option value="Физика">Физика</option>
                <option value="Русский язык">Русский язык</option>
            </select>
            <select id="level-select" class="bg-indigo-50 border border-indigo-100 text-indigo-700 py-1.5 px-3 rounded-lg text-xs font-medium outline-none shadow-sm transition-all">
                <option value="Средняя школа" selected>5-9 класс</option>
                <option value="Старшая школа">10-11 класс</option>
                <option value="ВУЗ">ВУЗ</option>
            </select>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        <aside id="sidebar" class="w-72 bg-white border-r border-slate-200 flex flex-col shrink-0 z-40 transition-transform duration-300">
            <div class="p-4 border-b border-slate-100 bg-slate-50/50">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center text-white font-bold" id="user-avatar">G</div>
                    <div class="flex flex-col">
                        <span class="text-sm font-bold text-slate-700" id="username-display">Гость</span>
                        <button onclick="showAuthModal()" class="text-[11px] text-indigo-500 font-medium" id="auth-btn-text">Войти в Solwix ID</button>
                    </div>
                </div>
            </div>
            <div class="p-4 font-bold text-[11px] text-slate-400 uppercase tracking-widest flex justify-between items-center">
                Чаты
                <button onclick="createNewChat()" class="hover:text-indigo-500 p-1"><i data-lucide="plus-square" class="w-4 h-4"></i></button>
            </div>
            <div id="chats-list" class="flex-1 overflow-y-auto px-2 space-y-1"></div>
            <div id="tools-container" class="p-3 space-y-2 border-t border-slate-50"></div>
        </aside>

        <main class="flex-1 flex flex-col bg-[#f8fafc] relative">
            <div id="sidebar-overlay" class="hidden absolute inset-0 bg-slate-900/20 backdrop-blur-[2px] z-30 sm:hidden"></div>
            <div class="flex-1 overflow-y-auto p-4 sm:p-8" id="chat-scroll-area">
                <div id="chat-messages" class="space-y-6 max-w-4xl mx-auto"></div>
                <div id="ai-typing-indicator" class="hidden mt-6 flex items-center gap-3 max-w-4xl mx-auto pl-4">
                    <div class="thinking-star"><i data-lucide="sparkles" class="text-indigo-400 w-5 h-5"></i></div>
                    <span class="text-[10px] font-black text-indigo-400 uppercase tracking-widest">Обработка...</span>
                </div>
            </div>

            <div class="p-4 sm:p-6 bg-white border-t border-slate-200">
                <div id="input-container" class="max-w-4xl mx-auto flex items-end gap-2 bg-slate-50 border border-slate-300 rounded-2xl p-2 transition-all shadow-sm">
                    <textarea id="chat-input" placeholder="Задай вопрос Solwix..." rows="1" class="w-full max-h-32 bg-transparent outline-none py-3 px-4 text-sm"></textarea>
                    <button id="send-btn" class="bg-gradient-to-r from-indigo-500 to-purple-500 text-white p-3 rounded-xl transition-all flex items-center justify-center min-w-[44px] min-h-[44px]">
                        <div id="btn-icon-container"><i data-lucide="send" class="w-5 h-5"></i></div>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <div id="auth-modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl">
            <h2 class="text-2xl font-bold text-center mb-6">Solwix ID</h2>
            <div class="space-y-4">
                <input type="text" id="auth-login" placeholder="Логин" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                <button onclick="handleAuth()" class="w-full bg-indigo-600 text-white p-3 rounded-xl font-bold">Войти</button>
                <button onclick="hideAuthModal()" class="w-full text-slate-400 text-sm">Отмена</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
