<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solwix AI — Твой умный помощник</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%236366f1' /%3E%3Cstop offset='100%25' style='stop-color:%23a855f7' /%3E%3C/linearGradient%3E%3C/defs%3E%3Cpolygon points='50,5 60,40 95,50 60,60 50,95 40,60 5,50 40,40' fill='url(%23g)' /%3E%3C/svg%3E">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-800 font-['Inter'] h-[100dvh] flex flex-col overflow-hidden">

    <header class="flex items-center justify-between px-4 sm:px-6 py-3 bg-white border-b border-slate-200 shadow-sm z-30 shrink-0">
        <div class="flex items-center gap-2">
            <button id="mobile-menu-btn" class="sm:hidden p-2 hover:bg-slate-100 rounded-lg text-slate-600 transition-colors">
                <i data-lucide="menu" class="w-6 h-6"></i>
            </button>
            
            <div class="flex items-center gap-2 sm:gap-3 p-1 rounded-xl cursor-pointer logo-container">
                <div class="logo-wrapper scale-90 sm:scale-100">
                    <svg width="32" height="32" viewBox="0 0 100 100">
                        <defs>
                            <linearGradient id="grad-solwix-head" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#6366f1" />
                                <stop offset="100%" style="stop-color:#a855f7" />
                            </linearGradient>
                        </defs>
                        <polygon points="50,5 60,40 95,50 60,60 50,95 40,60 5,50 40,40" fill="url(#grad-solwix-head)" />
                    </svg>
                </div>
                <h1 class="text-lg sm:text-xl font-bold text-slate-900 hidden xs:block">Solwix <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-purple-500">AI</span></h1>
            </div>
        </div>

        <div class="flex gap-1.5 sm:gap-3">
            <select id="subject-select" class="bg-slate-50 border border-slate-200 py-1.5 px-2 sm:px-3 rounded-lg text-[11px] sm:text-sm font-medium outline-none focus:ring-2 focus:ring-indigo-500 w-24 sm:w-auto truncate shadow-sm transition-all">
                <option value="Математика" selected>Математика</option>
                <option value="Алгебра">Алгебра</option>
                <option value="Геометрия">Геометрия</option>
                <option value="Информатика">Информатика</option>
                <option value="Физика">Физика</option>
                <option value="Химия">Химия</option>
                <option value="Биология">Биология</option>
                <option value="География">География</option>
                <option value="История">История</option>
                <option value="Обществознание">Обществознание</option>
                <option value="Русский язык">Русский язык</option>
                <option value="Литература">Литература</option>
                <option value="Английский язык">Английский язык</option>
            </select>

            <select id="level-select" class="bg-indigo-50 border border-indigo-100 text-indigo-700 py-1.5 px-2 sm:px-3 rounded-lg text-[11px] sm:text-sm font-medium outline-none w-24 sm:w-auto truncate shadow-sm transition-all">
                <option value="Средняя школа" selected>Средняя (5-9)</option>
                <option value="Старшая школа">Старшая (10-11)</option>
                <option value="ВУЗ">ВУЗ</option>
            </select>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        
        <aside id="sidebar" class="w-72 bg-white border-r border-slate-200 flex flex-col shrink-0 z-40 transition-transform duration-300 ease-in-out">
            <div class="p-4 border-b border-slate-100 bg-slate-50/50">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-100 to-purple-100 flex items-center justify-center text-indigo-600 font-bold shadow-sm" id="user-avatar">G</div>
                    <div class="flex flex-col">
                        <span class="text-sm font-bold text-slate-700" id="username-display">Гость</span>
                        <button onclick="showAuthModal()" class="text-[11px] text-indigo-500 hover:text-indigo-600 font-medium text-left transition-colors" id="auth-btn-text">Войти</button>
                    </div>
                </div>
            </div>

            <div class="p-4 font-bold text-[11px] text-slate-400 uppercase tracking-widest flex justify-between items-center">
                Твои чаты
                <button onclick="createNewChat()" class="hover:text-indigo-500 transition-colors p-1">
                    <i data-lucide="plus-square" class="w-4 h-4"></i>
                </button>
            </div>
            <div id="chats-list" class="flex-1 overflow-y-auto px-2 py-1 space-y-1"></div>

            <div class="p-4 font-bold text-[11px] text-slate-400 uppercase tracking-widest mt-2">Инструменты</div>
            <div id="tools-container" class="px-3 space-y-2"></div>
            
            <div class="px-3 py-4 border-t border-slate-100 mt-auto">
                <button onclick="shareChat()" class="flex items-center gap-3 p-3 w-full text-left rounded-xl hover:bg-slate-50 transition-all text-slate-600 group">
                    <i data-lucide="share-2" class="w-4 h-4 group-hover:text-indigo-500 transition-colors"></i>
                    <span class="text-sm font-medium group-hover:text-slate-800">Поделиться</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 bg-[#f8fafc] relative">
            <div id="sidebar-overlay" class="hidden absolute inset-0 bg-slate-900/20 backdrop-blur-[2px] z-30 sm:hidden"></div>

            <div class="flex-1 overflow-y-auto p-4 sm:p-8" id="chat-scroll-area">
                <div id="chat-messages" class="space-y-6 max-w-4xl mx-auto pb-4"></div>
                
                <div id="ai-typing-indicator" class="hidden mt-6 ml-4 flex items-center gap-3 max-w-4xl mx-auto">
                    <div class="thinking-star">
                        <svg width="24" height="24" viewBox="0 0 100 100">
                            <polygon points="50,5 60,40 95,50 60,60 50,95 40,60 5,50 40,40" fill="url(#grad-solwix-head)" />
                        </svg>
                    </div>
                    <span id="typing-text" class="text-[10px] font-black text-indigo-400 uppercase tracking-widest">Solwix думает...</span>
                </div>
            </div>

            <div class="p-4 sm:p-6 bg-white border-t border-slate-200 shadow-[0_-4px_20px_-15px_rgba(0,0,0,0.1)] relative">
                
                <div id="file-preview-container" class="hidden max-w-4xl mx-auto mb-3 p-2 bg-indigo-50/50 border border-indigo-100 rounded-xl flex items-center gap-3">
                    <div id="image-preview-slot" class="w-10 h-10 rounded-lg bg-cover bg-center border border-indigo-200"></div>
                    <span id="file-name-display" class="text-xs font-semibold text-indigo-700 truncate max-w-[200px]"></span>
                    <button onclick="clearAttachment()" class="ml-auto p-1.5 text-slate-400 hover:text-red-500 transition-colors bg-white rounded-md border border-slate-200 shadow-sm"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>

                <div class="max-w-4xl mx-auto flex items-end gap-2 sm:gap-3 bg-slate-50 border border-slate-300 rounded-2xl p-1.5 sm:p-2 focus-within:border-indigo-500 focus-within:ring-1 focus-within:ring-indigo-500 transition-all shadow-sm">
                    
                    <button onclick="document.getElementById('file-input').click()" class="p-3 text-slate-400 hover:text-indigo-500 hover:bg-white rounded-xl transition-all h-[44px] flex items-center justify-center">
                        <i data-lucide="paperclip" class="w-5 h-5"></i>
                    </button>
                    <input type="file" id="file-input" class="hidden" accept="image/*">

                    <textarea id="chat-input" placeholder="Задай вопрос или прикрепи фото..." rows="1" class="w-full max-h-32 bg-transparent outline-none resize-none py-3 px-1 sm:px-2 text-slate-700 text-sm placeholder:text-slate-400"></textarea>
                    
                    <button id="send-btn" class="bg-gradient-to-r from-indigo-500 to-purple-500 text-white p-3 rounded-xl hover:scale-105 active:scale-95 transition-all shadow-md flex items-center justify-center min-w-[44px] h-[44px]">
                        <div id="btn-icon-container">
                            <i data-lucide="send" class="w-5 h-5"></i>
                        </div>
                    </button>
                </div>

                <div class="max-w-4xl mx-auto mt-4 flex flex-wrap justify-between items-center gap-2 px-2">
                    <div class="flex items-center gap-3">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">© 2026 Solwix OS</span>
                        <div class="h-1 w-1 bg-slate-300 rounded-full"></div>
                        <span class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest">Created by You</span>
                    </div>
                    <div class="flex items-center gap-2 bg-slate-50 px-2 py-1 rounded border border-slate-200">
                        <div class="h-1.5 w-1.5 bg-emerald-400 rounded-full animate-pulse"></div>
                        <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Gemini 3.1 Pro Engine</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="auth-modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl border border-slate-100 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 to-purple-500"></div>
            <h2 class="text-2xl font-bold text-slate-800 mb-2 text-center">Solwix ID</h2>
            <p class="text-xs text-center text-slate-500 mb-6">Синхронизация профиля и чатов</p>
            <div class="space-y-4">
                <input type="text" id="auth-login" placeholder="Придумайте логин" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                <input type="password" id="auth-pass" placeholder="Пароль (необязательно)" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                <button onclick="handleAuth()" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white p-3 rounded-xl font-bold hover:opacity-90 shadow-md transition-opacity">Войти в систему</button>
                <button onclick="hideAuthModal()" class="w-full text-slate-400 text-sm hover:text-slate-600 transition-colors text-center py-2">Отмена</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
