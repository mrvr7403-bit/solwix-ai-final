<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solwix AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-800 font-['Inter'] h-screen flex flex-col overflow-hidden">

    <header class="flex items-center justify-between px-6 py-4 bg-white border-b border-slate-200 shadow-sm z-30 shrink-0">
        <div class="flex items-center gap-3 bg-slate-50/50 p-2 rounded-xl border border-indigo-50 hover:border-indigo-200 transition-all cursor-pointer group logo-container">
            <div class="logo-wrapper">
                <svg width="32" height="32" viewBox="0 0 100 100">
                    <defs>
                        <linearGradient id="grad-solwix" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <circle cx="50" cy="50" r="45" fill="none" stroke="url(#grad-solwix)" stroke-width="3" stroke-opacity="0.2" />
                    <polygon points="50,5 60,40 95,50 60,60 50,95 40,60 5,50 40,40" fill="url(#grad-solwix)" />
                </svg>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-slate-900">Solwix <span class="bg-clip-text text-transparent bg-gradient-to-r from-indigo-500 to-purple-500">AI</span></h1>
        </div>

        <div class="flex gap-2">
            <select id="subject-select" class="bg-slate-50 border border-slate-200 py-2 px-3 rounded-lg text-sm font-medium outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="Математика">Математика</option>
                <option value="Физика">Физика</option>
            </select>
            <select id="level-select" class="bg-indigo-50 border border-indigo-100 text-indigo-700 py-2 px-3 rounded-lg text-sm font-medium outline-none">
                <option value="Средняя школа">Средняя</option>
                <option value="Профи/ВУЗ">Профи</option>
            </select>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <main class="flex-1 flex flex-col min-w-0 bg-[#f8fafc] relative">
            <div class="flex-1 overflow-y-auto p-4 sm:p-8" id="chat-scroll-area">
                <div id="chat-messages" class="space-y-8 max-w-4xl mx-auto"></div>
                
                <div id="ai-typing-indicator" class="hidden mt-6 flex items-center gap-4 animate-pulse">
                    <div class="thinking-logo">
                        <svg width="40" height="40" viewBox="0 0 100 100">
                            <polygon points="50,5 60,40 95,50 60,60 50,95 40,60 5,50 40,40" fill="url(#grad-solwix)" />
                        </svg>
                    </div>
                    <span class="text-indigo-500 font-medium text-sm tracking-widest uppercase">Solwix думает...</span>
                </div>
            </div>

            <div class="p-4 bg-white border-t border-slate-200 shadow-[0_-4px_20px_rgba(0,0,0,0.03)]">
                <div class="max-w-4xl mx-auto flex items-end gap-3 bg-slate-50 border border-slate-300 rounded-2xl p-2 focus-within:border-indigo-500 transition-all">
                    <textarea id="chat-input" placeholder="Спроси что угодно..." rows="1" class="w-full bg-transparent outline-none resize-none py-3 px-4 text-slate-700"></textarea>
                    <button id="send-btn" class="bg-gradient-to-r from-indigo-500 to-purple-500 text-white p-3 rounded-xl hover:scale-105 transition-all disabled:opacity-50">
                        <i data-lucide="send" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </main>

        <aside class="hidden lg:flex w-80 bg-white border-l border-slate-200 flex-col shrink-0">
            <div class="p-6 border-b border-slate-100 font-bold text-slate-700 flex items-center gap-2">
                <i data-lucide="layout-grid" class="w-5 h-5 text-indigo-500"></i> ПАНЕЛЬ УПРАВЛЕНИЯ
            </div>
            <div id="tools-container" class="p-4 space-y-3 flex-1 overflow-y-auto"></div>
            
            <div class="m-4 p-5 rounded-2xl bg-gradient-to-br from-slate-900 to-indigo-950 text-white shadow-xl relative overflow-hidden group">
                <div class="relative z-10">
                    <div class="text-indigo-400 font-black text-xs tracking-tighter mb-1">POWERED BY GEMINI 2.5</div>
                    <div class="text-[10px] text-slate-400 leading-tight uppercase tracking-widest">Grid Entertainment Neural System</div>
                </div>
                <div class="absolute -right-4 -bottom-4 opacity-10 group-hover:scale-125 transition-transform">
                    <svg width="100" height="100" viewBox="0 0 100 100"><polygon points="50,5 60,40 95,50 60,60 50,95 40,60 5,50 40,40" fill="white" /></svg>
                </div>
            </div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
