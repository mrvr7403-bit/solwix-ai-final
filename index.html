<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solwix AI — Академический помощник</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-800 font-['Inter'] h-screen flex flex-col overflow-hidden">

    <header class="flex items-center justify-between px-6 py-4 bg-white border-b border-slate-200 shadow-sm z-20 shrink-0">
        <div class="flex items-center gap-3">
            <div class="flex items-center gap-2 text-blue-600 bg-blue-50 p-2 rounded-xl border border-blue-100">
                <i data-lucide="graduation-cap" class="w-6 h-6"></i>
                <h1 class="text-xl font-bold tracking-tight text-slate-900">Solwix <span class="font-light text-blue-600">AI</span></h1>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <select id="subject-select" class="bg-slate-50 border border-slate-200 text-slate-700 py-2 px-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition-all font-medium text-sm w-32 sm:w-40 shadow-sm">
                <option value="Математика">Математика</option>
                <option value="Физика">Физика</option>
                <option value="История">История</option>
                <option value="Языки">Языки</option>
            </select>
            <select id="level-select" class="bg-blue-50 border border-blue-100 text-blue-700 py-2 px-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition-all font-medium text-sm w-28 sm:w-32 shadow-sm">
                <option value="Младшая школа">Младшая</option>
                <option value="Средняя школа" selected>Средняя</option>
                <option value="Профи/ВУЗ">Профи</option>
            </select>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        <main class="flex-1 flex flex-col min-w-0 bg-[#f8fafc]">
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6">
                </div>

            <div class="p-4 sm:p-6 bg-white border-t border-slate-200">
                <div class="max-w-4xl mx-auto flex items-end gap-3 bg-slate-50 border border-slate-300 rounded-2xl p-2 focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500 transition-all shadow-sm">
                    <textarea id="chat-input" placeholder="Задай вопрос Solwix..." rows="1" class="w-full max-h-40 bg-transparent outline-none resize-none py-3 px-4 text-slate-700"></textarea>
                    <button id="send-btn" class="bg-blue-600 text-white p-3 rounded-xl hover:bg-blue-700 transition-all disabled:opacity-50 disabled:cursor-not-allowed shadow-md">
                        <i data-lucide="send" class="w-5 h-5"></i>
                    </button>
                </div>
                <p class="text-center text-[10px] text-slate-400 mt-3 uppercase tracking-widest font-medium">Powered by Solwix Engine</p>
            </div>
        </main>

        <aside class="hidden lg:flex w-72 bg-white border-l border-slate-200 flex-col shrink-0">
            <div class="p-5 border-b border-slate-100 flex items-center gap-2 font-semibold text-slate-700">
                <i data-lucide="zap" class="text-blue-600 w-5 h-5"></i>
                Инструменты
            </div>
            <div id="tools-container" class="p-4 space-y-3">
                </div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
